general {
    gaps_in = 0
    gaps_out = 0
    border_size = 2
    col.active_border = rgba(79b0beff) rgba(f18897ff) 45deg
    col.inactive_border = rgba(000000ff) rgba(000000ff) 
    layout = dwindle
    resize_on_border = true
    allow_tearing = true
}

decoration {
    rounding = 0

    blur {
        enabled = yes
    }
}

#blurls = waybar
