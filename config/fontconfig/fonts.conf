<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Set default fonts for all applications (GTK, QT, etc.) -->
  <match target="pattern">
    <name>sans-serif</name>
    <edit name="family" mode="append" binding="strong">
      <string>JetBrainsMono Nerd Font</string>
    </edit>
    <edit name="weight" mode="append" binding="strong">
      <const>medium</const>
    </edit>
  </match>
  <match target="pattern">
    <name>serif</name>
    <edit name="family" mode="append" binding="strong">
      <string>JetBrainsMono Nerd Font</string>
    </edit>
    <edit name="weight" mode="append" binding="strong">
      <const>medium</const>
    </edit>
  </match>
  <match target="pattern">
    <name>monospace</name>
    <edit name="family" mode="append" binding="strong">
      <string>JetBrainsMono Nerd Font</string>
    </edit>
    <edit name="weight" mode="append" binding="strong">
      <const>medium</const>
    </edit>
  </match>
</fontconfig>
